<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório IT - Operacionais</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="equipe.css">
    <script src="equipe.js" defer></script>
</head>
<body class="equipe-body">
    
    <div id="cursor-blur"></div>

    <div class="equipe-container">
        <header class="equipe-header">
            <div class="header-left">
                <h1 class="glitch-text">OPERADORES DA TI</h1>
                <p class="subtitle">SISTEMA DE GESTÃO DE CREDENCIAIS</p>
            </div>
            <div class="header-right">
                <button id="btn-novo-agente" class="btn-acao-topo">➕ NOVO OPERADOR</button>
                <a href="portal.html" class="btn-voltar">🔙 SAIR</a>
            </div>
        </header>

        <div class="action-bar">
            <div class="search-wrap">
                <span class="search-icon">🔍</span>
                <input type="text" id="input-busca" placeholder="BUSCAR AGENTE PELO NOME..." autocomplete="off">
            </div>
            
            <div class="filter-bar">
                <button class="filter-btn active" data-filter="all">TODOS</button>
                <button class="filter-btn" data-filter="coordenador">COORDENADORES</button>
                <button class="filter-btn" data-filter="analista">ANALISTAS</button>
                <button class="filter-btn" data-filter="tecnico">TÉCNICOS</button>
            </div>
        </div>

        <div class="roster-grid" id="roster-grid"></div>
    </div>

    <div id="modal-editar-agente" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <h3 id="modal-titulo" class="modal-h3">✏️ EDITAR CREDENCIAL</h3>
            
            <input type="hidden" id="edit-id">
            
            <div class="form-row">
                <div class="form-group">
                    <label>NOME COMPLETO:</label>
                    <input type="text" id="edit-nome" class="form-input">
                </div>
                <div class="form-group">
                    <label>AVATAR (EMOJI OU LINK):</label>
                    <input type="text" id="edit-avatar" class="form-input" placeholder="👨‍💻 ou URL da foto">
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>NÍVEL DE ACESSO:</label>
                    <select id="edit-cargo" class="form-input">
                        <option value="coordenador">Coordenador</option>
                        <option value="analista">Analista</option>
                        <option value="tecnico">Técnico</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>TELEFONE:</label>
                    <input type="text" id="edit-contato" class="form-input" placeholder="(00) 00000-0000">
                </div>
            </div>

            <label>E-MAIL CORPORATIVO:</label>
            <input type="email" id="edit-email" class="form-input" placeholder="exemplo@empresa.com">
            
            <label>ATRIBUIÇÕES TÁTICAS:</label>
            <textarea id="edit-descricao" class="form-input" rows="3"></textarea>

            <div class="modal-footer">
                <button id="btn-salvar-agente" class="btn-confirmar">💾 SALVAR</button>
                <button id="btn-remover-agente" class="btn-perigo">🗑️ EXCLUIR</button>
                <button id="btn-fechar-agente" class="btn-cancelar">FECHAR</button>
            </div>
        </div>
    </div>

</body>
</html>
